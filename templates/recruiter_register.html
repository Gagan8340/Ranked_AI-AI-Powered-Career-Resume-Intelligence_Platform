<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Registration - Ranked.ai</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--bg-main) 0%, rgba(37, 99, 235, 0.05) 100%);
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #10b981, #9333ea);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-section-title {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            margin-top: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            position: relative;
            margin-bottom: 1.75rem;
        }

        .form-label {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 500;
            pointer-events: none;
            transition: all 0.2s ease;
            margin: 0;
            background: transparent;
            z-index: 2;
        }

        .form-control {
            width: 100%;
            padding: 1rem 1rem;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .form-control::placeholder {
            color: transparent;
        }

        .form-control:focus ~ .form-label,
        .form-control:not(:placeholder-shown) ~ .form-label {
            top: 0;
            left: 0.5rem;
            transform: translateY(-50%) scale(0.85);
            background: var(--bg-light);
            padding: 0 0.5rem;
            color: #10b981;
        }

        .form-control:not(:focus):not(:placeholder-shown) ~ .form-label {
            color: var(--text-primary);
        }

        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }
        
        textarea.form-control ~ .form-label {
            top: 1.5rem;
        }

        .form-control:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-link {
            color: #10b981;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block;
        }
        
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Recruiter Registration</h1>
                <p class="auth-subtitle">Create your company profile to start hiring</p>
            </div>

            <div id="error-alert" class="alert" style="display: none;"></div>

            <form id="register-form">
                <div class="form-section-title">Step 1: Recruiter Details</div>
                
                <div class="form-row">
                    <div class="form-group">
                        <input type="text" id="name" class="form-control" placeholder=" " required>
                        <label class="form-label" for="name">Full Name</label>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" class="form-control" placeholder=" " required>
                        <label class="form-label" for="email">Work Email</label>
                    </div>
                </div>

                <div class="form-group">
                    <input type="password" id="password" class="form-control" placeholder=" " required>
                    <label class="form-label" for="password">Password</label>
                </div>

                <div class="form-section-title">Step 2: Company Setup</div>

                <div class="form-row">
                    <div class="form-group">
                        <input type="text" id="company_name" class="form-control" placeholder=" " required>
                        <label class="form-label" for="company_name">Company Name</label>
                    </div>
                    <div class="form-group">
                        <input type="text" id="company_industry" class="form-control" placeholder=" ">
                        <label class="form-label" for="company_industry">Industry</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <input type="url" id="company_website" class="form-control" placeholder=" ">
                    <label class="form-label" for="company_website">Website URL (Optional)</label>
                </div>

                <div class="form-group">
                    <textarea id="company_description" class="form-control" placeholder=" "></textarea>
                    <label class="form-label" for="company_description">Company Description</label>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 2rem;">
                    <input type="checkbox" id="terms" required style="width: auto;">
                    <label for="terms" class="form-label" style="margin-bottom: 0; position: static; transform: none; pointer-events: auto;">I agree to the <a href="/terms" class="auth-link">Terms of Service</a> and <a href="/privacy" class="auth-link">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">Create Recruiter Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/recruiter/login" class="auth-link">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                company_name: document.getElementById('company_name').value,
                company_industry: document.getElementById('company_industry').value,
                company_website: document.getElementById('company_website').value,
                company_description: document.getElementById('company_description').value
            };
            
            const btn = document.getElementById('submit-btn');
            const alert = document.getElementById('error-alert');

            if (!document.getElementById('terms').checked) {
                alert.textContent = 'You must agree to the Terms of Service and Privacy Policy.';
                alert.className = 'alert alert-error';
                alert.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';
            alert.style.display = 'none';

            try {
                const response = await fetch('/api/recruiter/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = '/recruiter/login';
                } else {
                    throw new Error(data.message || 'Registration failed');
                }
            } catch (err) {
                alert.textContent = err.message;
                alert.className = 'alert alert-error';
                btn.disabled = false;
                btn.textContent = 'Create Recruiter Account';
            }
        });
    </script>
</body>
</html>
