<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranked.ai — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    body { min-height: 100vh; background: linear-gradient(-45deg, #09090b, #18181b, #121214, #0a0a0c); background-size: 400% 400%; animation: gradientShift 15s ease infinite; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; padding: 24px; color: #fff; }
    .card { background: transparent; border: none; border-radius: 16px; padding: 40px; text-align: center; max-width: 440px; width: 100%; box-shadow: none; animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 28px; margin-bottom: 12px; }
    p { color: #8892b0; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .error-msg { background: rgba(226,75,74,0.1); border: 1px solid rgba(226,75,74,0.3); color: #e24b4a; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 24px; display: none; }
    .success-msg { background: rgba(93,202,165,0.1); border: 1px solid rgba(93,202,165,0.3); color: #5dcaa5; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 24px; display: none; }
    .btn { display: block; width: 100%; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; font-family: 'Space Grotesk', sans-serif; transition: all .2s; }
    .btn-primary { background: linear-gradient(135deg, #d946ef, #6366F1, #7C3AED, #10B981); color: #fff; border: none; margin-bottom: 12px; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
    .btn-secondary { background: #0a0d1a; border: 1px solid #1e2340; color: #8892b0; }
    .btn-secondary:hover { color: #fff; border-color: #3a4060; }
    .input-wrap { position: relative; margin-bottom: 24px; text-align: left; }
    .input-wrap input { width: 100%; padding: 12px 16px; background: rgba(10, 13, 26, 0.5); border: 1px solid #1e2340; border-radius: 10px; color: #fff; font-size: 14px; outline: none; transition: border .2s; }
    .input-wrap input:focus { border-color: #8b6dfd; box-shadow: 0 0 0 3px rgba(139,109,253,0.12); }
    .input-wrap label { position: absolute; left: 16px; top: -8px; background: transparent; padding: 0 4px; font-size: 12px; color: #8b6dfd; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Forgot Password?</h1>
    <p>Enter the email address associated with your account and we'll send you a link to reset your password.</p>
    
    <div id="status-error" class="error-msg"></div>
    <div id="status-success" class="success-msg"></div>

    <form id="forgotForm">
      <div class="input-wrap" id="email-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required />
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">Send Reset Link</button>
      <a href="/login" class="btn btn-secondary">Back To Login</a>
    </form>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const emailInput = document.getElementById('email');
      const errorEl = document.getElementById('status-error');
      const successEl = document.getElementById('status-success');
      
      const email = emailInput.value.trim();
      
      btn.disabled = true;
      btn.textContent = 'Sending...';
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      try {
        const res = await fetch('/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        
        if (res.ok && data.success) {
          successEl.innerHTML = (data.message || 'A password reset link has been sent.') + '<br><br><strong>Check your spam/junk folder for the mails.</strong>';
          successEl.style.display = 'block';
          document.getElementById('email-group').style.display = 'none';
          btn.style.display = 'none';
        } else {
          errorEl.textContent = data.message || 'Failed to process request.';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'An error occurred. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        if(btn.style.display !== 'none') {
            btn.disabled = false;
            btn.textContent = 'Send Reset Link';
        }
      }
    });
  </script>
</body>
</html>
