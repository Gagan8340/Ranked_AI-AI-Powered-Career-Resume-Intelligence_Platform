<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranked.ai — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    body { min-height: 100vh; background: linear-gradient(-45deg, #09090b, #18181b, #121214, #0a0a0c); background-size: 400% 400%; animation: gradientShift 15s ease infinite; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; padding: 24px; color: #fff; }
    .card { background: transparent; border: none; border-radius: 16px; padding: 40px; text-align: center; max-width: 440px; width: 100%; box-shadow: none; animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 28px; margin-bottom: 12px; }
    p { color: #8892b0; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .error-msg { background: rgba(226,75,74,0.1); border: 1px solid rgba(226,75,74,0.3); color: #e24b4a; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 24px; display: none; }
    .success-msg { background: rgba(93,202,165,0.1); border: 1px solid rgba(93,202,165,0.3); color: #5dcaa5; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 24px; display: none; }
    .btn { display: block; width: 100%; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; font-family: 'Space Grotesk', sans-serif; transition: all .2s; }
    .btn-primary { background: linear-gradient(135deg, #d946ef, #6366F1, #7C3AED, #10B981); color: #fff; border: none; margin-bottom: 12px; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
    .btn-secondary { background: #0a0d1a; border: 1px solid #1e2340; color: #8892b0; }
    .btn-secondary:hover { color: #fff; border-color: #3a4060; }
    .input-wrap { position: relative; margin-bottom: 24px; text-align: left; }
    .input-wrap input { width: 100%; padding: 12px 16px; background: rgba(10, 13, 26, 0.5); border: 1px solid #1e2340; border-radius: 10px; color: #fff; font-size: 14px; outline: none; transition: border .2s; }
    .input-wrap input:focus { border-color: #8b6dfd; box-shadow: 0 0 0 3px rgba(139,109,253,0.12); }
    .input-wrap label { position: absolute; left: 16px; top: -8px; background: transparent; padding: 0 4px; font-size: 12px; color: #8b6dfd; font-weight: 500; }
    .toggle-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #8892b0; padding: 0; line-height: 0; }
    .toggle-eye:hover { color: #fff; }
    .strength-bars { display: flex; gap: 4px; margin: 6px 0 4px; }
    .strength-bars div { flex: 1; height: 3px; border-radius: 2px; background: #1e2340; transition: background .3s; }
    .strength-label { font-size: 11px; color: #8892b0; margin-bottom: 24px; text-align: left; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create New Password</h1>
    <p>Please enter your new password below.</p>
    
    <div id="status-error" class="error-msg"></div>
    <div id="status-success" class="success-msg"></div>

    <form id="resetForm">
      <div class="input-wrap" style="margin-bottom: 0;">
        <label>New Password</label>
        <input type="password" id="password" placeholder="Enter new password" required minlength="8" oninput="checkStrength(this.value)" style="padding-right: 40px;" />
        <button type="button" class="toggle-eye" onclick="var p=document.getElementById('password');p.type=p.type==='password'?'text':'password'">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>
      <div class="strength-bars">
        <div id="s1"></div><div id="s2"></div><div id="s3"></div><div id="s4"></div>
      </div>
      <p class="strength-label" id="strength-label">Must be 8+ characters with uppercase, number &amp; symbol.</p>
      
      <div class="input-wrap" id="pwd-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm new password" required minlength="8" style="padding-right: 40px;" />
        <button type="button" class="toggle-eye" onclick="var p=document.getElementById('confirm-password');p.type=p.type==='password'?'text':'password'">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">Update Password</button>
      <a href="/login" class="btn btn-secondary" id="loginBtn" style="display: none;">Go To Login</a>
    </form>
  </div>

  <script>
    function checkStrength(v) {
      var bars = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
      var lbl = document.getElementById('strength-label');
      var score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      var colors = ['#e24b4a', '#ef9f27', '#4f9ef8', '#5dcaa5'];
      var labels = ['Weak — add more characters', 'Fair — try adding numbers', 'Good — add a symbol', 'Strong password ✓'];
      bars.forEach(function (el, i) { el.style.background = i < score ? colors[score - 1] : '#1e2340'; });
      lbl.style.color = score > 0 ? colors[score - 1] : '#8892b0';
      lbl.textContent = score > 0 ? labels[score - 1] : 'Must be 8+ characters with uppercase, number & symbol.';
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const pwdInput = document.getElementById('password');
      const confirmInput = document.getElementById('confirm-password');
      const errorEl = document.getElementById('status-error');
      const successEl = document.getElementById('status-success');
      
      const password = pwdInput.value;
      const confirmPassword = confirmInput.value;
      
      if (password !== confirmPassword) {
          errorEl.textContent = 'Passwords do not match.';
          errorEl.style.display = 'block';
          return;
      }
      
      btn.disabled = true;
      btn.textContent = 'Updating...';
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      try {
        const res = await fetch(window.location.pathname, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        
        if (res.ok && data.success) {
          successEl.textContent = data.message || 'Password has been updated.';
          successEl.style.display = 'block';
          document.querySelectorAll('.input-wrap').forEach(el => el.style.display = 'none');
          btn.style.display = 'none';
          document.getElementById('loginBtn').style.display = 'block';
          
          if(data.redirect) {
              setTimeout(() => {
                  window.location.href = data.redirect;
              }, 2000);
          }
        } else {
          errorEl.textContent = data.message || 'Failed to update password.';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'An error occurred. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        if(btn.style.display !== 'none') {
            btn.disabled = false;
            btn.textContent = 'Update Password';
        }
      }
    });
  </script>
</body>
</html>
