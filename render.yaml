services:
  - type: web
    name: smartcampus-ai
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: UPLOAD_FOLDER
        sync: false
      - key: MAX_CONTENT_LENGTH
        sync: false
      - key: JWT_ACCESS_TOKEN_EXPIRES_HOURS
        sync: false
      - key: GEMINI_CACHE_TTL_SECONDS
        sync: false
      - key: GEMINI_CACHE_MAX
        sync: false
